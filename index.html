<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 작품 모음 포트폴리오</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.2rem;
      font-weight: 700;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      max-width: 800px;
      gap: 24px;
    }

    #projects .cell {
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      border: none;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    #projects .cell:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

 #projects .cell iframe {
   position: absolute;
   top: 0;
   left: 0;
   width: 100%;  
   height: 100%; 
   border: none;
 }
  </style>
</head>
<body>

  <h1>나의 p5.js 작품 포트폴리오</h1>

  <main id="projects">
    <div class="cell">
      <iframe src="sample1/index.html"></iframe>
    </div>

    <div class="cell">
      <iframe src="sample4/index.html"></iframe>
    </div>

    <div class="cell">
      <iframe src="sample2/index.html"></iframe>
    </div>

    <div class="cell">
      <iframe src="sample3/index.html"></iframe>
    </div>
  </main>

</body>
</html>
